services:
  agent-container:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: chama-agent
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: /workspace/chama/agent/.gh-app-key.pem
    volumes:
      - ../..:/workspace
      - agent-home:/home/agent
    tty: true
    stdin_open: true

volumes:
  agent-home:
